[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = ""
  debug = false
  quiet = false
  logfile = ""

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  organization = "iot"
  bucket = "CurrentData"
  token = "MyToken"
  timeout = "5s"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mqtt:1883"]
  topics = [
    "#",
  ]
  qos = 0
  connection_timeout = "30s"
  data_format = "json"
  json_time_key = "Timestamp"
  json_time_format = "2006-01-02T15:04:05-07:00"
  json_timezone = "UTC"
  json_name_key = "Name"
  tag_keys = ["ProductCode"]